name: India Trend Radar Scheduler

on:
  schedule:
    # Runs every day at 6:00 AM IST (00:30 UTC)
    - cron: '30 0 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  data-collection:
    runs-on: ubuntu-latest

    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Install spaCy and English model
      - name: Install spaCy Model
        run: |
          python -m spacy download en_core_web_sm

      # Google Trends

      - name: Run Google Trends
        run: python -m scripts.data_collection.google_trends

      - name: Run Google Cleaning
        run: python -m scripts.Cleaning.google_cleaning

      # News Collection

      - name: Run News Collection
        run: python -m scripts.data_collection.news_fetch

      - name: Run News Cleaning
        run: python -m scripts.Cleaning.news_cleaning

      # YouTube Collection

      - name: Run YouTube Collection
        run: python -m scripts.data_collection.youtube_fetch

      - name: Run YouTube Cleaning
        run: python -m scripts.Cleaning.youtube_cleaning

      - name: Commit Updated Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Latest changes from GitHub
          git pull --rebase origin main

          # Add all updated files
          git add .

          # Commit only if there are changes
          git diff --cached --quiet || git commit -m "Daily automated data collection"

          # Push changes
          git push origin main
